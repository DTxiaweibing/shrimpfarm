<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>动态水质调控板</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #d4e2d0;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, 'Roboto', sans-serif;
            padding: 8px;
        }
        .card {
            background: #fefcf5;
            border-radius: 40px;
            padding: 20px 12px 20px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
            max-width: 100%;
            width: 100%;
            overflow-x: auto;
        }
        .title {
            text-align: center;
            font-size: 1.6rem;
            font-weight: bold;
            color: #1c4f2a;
            margin-bottom: 20px;
        }
        .five-bars {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            gap: 6px;
            justify-content: space-evenly;
            margin-bottom: 24px;
        }
        .param-unit {
            flex: 1 1 0;
            min-width: 55px;
            background: #f1f7ef;
            border-radius: 32px;
            padding: 10px 4px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .current-val {
            font-weight: 800;
            font-size: 1.1rem;
            background: #ffffffd9;
            padding: 3px 4px;
            border-radius: 28px;
            width: 90%;
            text-align: center;
            color: #1c4f2a;
        }
        /* 滑块高度降低到320px */
        .vert-slider {
            -webkit-appearance: slider-vertical;
            writing-mode: vertical-lr;
            direction: rtl;
            appearance: slider-vertical;
            width: 24px;
            height: 320px;
            background: #d2e4ca;
            border-radius: 28px;
            margin: 8px 0;
            cursor: pointer;
        }
        .param-label {
            font-size: 1.05rem;
            font-weight: 700;
            background: #e0ebda;
            padding: 3px 6px;
            border-radius: 20px;
            width: 100%;
            text-align: center;
            color: #2c643a;
            white-space: nowrap;
        }
        /* 顶部信息栏：加宽加高 */
        .info-header {
            background: #2c4030;
            border-radius: 44px;
            padding: 18px 20px;      /* 大幅增加内边距，变高变宽 */
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;        /* 字体加大 */
            font-weight: 600;
            color: #e2f0da;
        }
        .info-header span {
            font-size: 1.1rem;
        }
        .advice-container {
            background: #e8f5e9;
            border-radius: 40px;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .advice-row {
            background: transparent;
            border-radius: 36px;
            min-height: 44px;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            scrollbar-width: thin;
            display: flex;
            align-items: center;
        }
        .advice-row::-webkit-scrollbar {
            height: 4px;
            background: #e0e0e0;
            border-radius: 4px;
        }
        .advice-row::-webkit-scrollbar-thumb {
            background: #b0b0b0;
            border-radius: 4px;
        }
        .advice-content {
            display: inline-block;
            font-weight: 700;
            font-size: 0.85rem;
            padding: 8px 14px;
            border-radius: 36px;
            width: 100%;
        }
        .placeholder {
            color: #7e9a78;
            font-weight: normal;
            background: transparent;
        }
        .temp-advice { background: #ffae4a; color: #1f311c; }
        .ph-advice { background: #ffae4a; color: #1f311c; }
        .nh3-advice { background: #ff8c5a; color: #1f311c; }
        @media (max-width: 550px) {
            .five-bars { gap: 4px; }
            .param-unit { min-width: 48px; padding: 8px 2px; }
            .current-val { font-size: 0.9rem; }
            .vert-slider { height: 220px; width: 20px; }
            .param-label { font-size: 0.85rem; white-space: normal; }
            .advice-content { font-size: 0.75rem; padding: 6px 10px; }
            .title { font-size: 1.3rem; }
            .info-header { font-size: 0.9rem; padding: 12px 14px; }
            .info-header span { font-size: 0.9rem; }
        }
        @media (max-width: 450px) {
            .vert-slider { height: 180px; width: 18px; }
            .current-val { font-size: 0.8rem; }
            .param-label { font-size: 0.75rem; }
            .title { font-size: 1.2rem; }
            .info-header { font-size: 0.8rem; padding: 10px 12px; }
            .info-header span { font-size: 0.8rem; }
        }
        * { transition: none !important; }
    </style>
</head>
<body>
<div class="card">
    <div class="title">动态水质调控板</div>

    <div class="five-bars">
        <div class="param-unit"><div class="current-val" id="tempVal">28.0</div><input type="range" id="tempSlider" class="vert-slider" min="20" max="33" step="0.5" value="28"><div class="param-label">温度(℃)</div></div>
        <div class="param-unit"><div class="current-val" id="phVal">8.20</div><input type="range" id="phSlider" class="vert-slider" min="7.2" max="9.4" step="0.02" value="8.2"><div class="param-label">pH值</div></div>
        <div class="param-unit"><div class="current-val" id="salVal">20</div><input type="range" id="salSlider" class="vert-slider" min="0" max="40" step="1" value="20"><div class="param-label">盐度(‰)</div></div>
        <div class="param-unit"><div class="current-val" id="tanVal">0.50</div><input type="range" id="tanSlider" class="vert-slider" min="0" max="4.0" step="0.02" value="0.5"><div class="param-label">总氨氮</div></div>
        <div class="param-unit"><div class="current-val" id="dayVal">30</div><input type="range" id="daySlider" class="vert-slider" min="1" max="100" step="1" value="30"><div class="param-label">养殖天数</div></div>
    </div>

    <!-- 加高加宽后的顶部黑条 -->
    <div class="info-header">
        <span>🧪 NH₃ <strong id="nh3Display">0.000</strong> mg/L</span>
        <span>安全阈值: <strong id="nh3SafeLimit">0.100</strong> mg/L</span>
        <span id="dayHint" style="font-size:0.85rem;">(天数30)</span>
    </div>

    <div class="advice-container">
        <div class="advice-row" id="tempAdviceRow"><div class="advice-content temp-advice" id="tempAdviceText">— — —</div></div>
        <div class="advice-row" id="phAdviceRow"><div class="advice-content ph-advice" id="phAdviceText">— — —</div></div>
        <div class="advice-row" id="nh3AdviceRow"><div class="advice-content nh3-advice" id="nh3AdviceText">— — —</div></div>
    </div>
</div>

<script>
    function getSalinityFactor(sal) {
        if (sal < 5) return 0.45;
        if (sal < 10) return 0.65;
        if (sal < 20) return 0.85;
        return 1.0;
    }

    function getBaseSafeNH3(day) {
        if (day <= 15) return 0.05;
        if (day <= 45) {
            let t = (day - 15) / 30.0;
            return +(0.05 + t * (0.20 - 0.05)).toFixed(3);
        }
        if (day <= 60) {
            let t = (day - 45) / 15.0;
            return +(0.20 + t * (0.35 - 0.20)).toFixed(3);
        }
        return 0.35;
    }

    function getFinalSafeNH3(salinity, day) {
        let base = getBaseSafeNH3(day);
        let factor = getSalinityFactor(salinity);
        return base * factor;
    }

    function calcPKa(tempC) {
        return 0.09018 + 2729.92 / (tempC + 273.15);
    }

    function calcNH3(pH, tempC, tan, salinity) {
        let pKa = calcPKa(tempC);
        let ratio = Math.pow(10, pKa - pH) + 1;
        return tan / ratio;
    }

    function getTempAdvice(tempC) {
        if (tempC > 32) return `🌡️ 温度 ${tempC.toFixed(1)}℃：加大增氧、遮阳、加深水位`;
        if (tempC < 22) return `❄️ 温度 ${tempC.toFixed(1)}℃：请加温至22℃以上`;
        return "";
    }

    function getPhAdvice(pH) {
        if (pH >= 9.0) return `🧪 pH ${pH.toFixed(2)}：遮光+芽孢光合+乳酸菌100斤/亩`;
        if (pH >= 8.8) return `🧪 pH ${pH.toFixed(2)}：遮光+芽孢光合+乳酸菌50斤/亩`;
        if (pH >= 8.7) return `🧪 pH ${pH.toFixed(2)}：遮光控藻`;
        if (pH <= 8.0) return `🧪 pH ${pH.toFixed(2)}：泼洒生石灰5-10kg/亩`;
        return "";
    }

    function getNh3Advice(nh3, safeNh3, tan, pH) {
        if (nh3 > safeNh3) {
            let advice = "⚠️ NH₃超：光合菌+红糖，减料增氧";
            if (pH <= 8.0 && tan > 1.0) advice += "，小球藻种+磷酸二氢钾培藻";
            return advice;
        }
        return "";
    }

    const tempSlider = document.getElementById('tempSlider');
    const phSlider = document.getElementById('phSlider');
    const salSlider = document.getElementById('salSlider');
    const tanSlider = document.getElementById('tanSlider');
    const daySlider = document.getElementById('daySlider');
    const tempVal = document.getElementById('tempVal');
    const phVal = document.getElementById('phVal');
    const salVal = document.getElementById('salVal');
    const tanVal = document.getElementById('tanVal');
    const dayVal = document.getElementById('dayVal');
    const nh3Display = document.getElementById('nh3Display');
    const nh3SafeLimitSpan = document.getElementById('nh3SafeLimit');
    const dayHint = document.getElementById('dayHint');
    const tempAdviceText = document.getElementById('tempAdviceText');
    const phAdviceText = document.getElementById('phAdviceText');
    const nh3AdviceText = document.getElementById('nh3AdviceText');

    function refresh() {
        let temp = parseFloat(tempSlider.value);
        let pH = parseFloat(phSlider.value);
        let sal = parseFloat(salSlider.value);
        let tan = parseFloat(tanSlider.value);
        let day = parseInt(daySlider.value);

        tempVal.innerText = temp.toFixed(1);
        phVal.innerText = pH.toFixed(2);
        salVal.innerText = sal;
        tanVal.innerText = tan.toFixed(2);
        dayVal.innerText = day;

        let safeNH3 = getFinalSafeNH3(sal, day);
        let currentNH3 = calcNH3(pH, temp, tan, sal);
        nh3Display.innerText = currentNH3.toFixed(4);
        nh3SafeLimitSpan.innerText = safeNH3.toFixed(3);
        dayHint.innerText = `(天数${day})`;

        let tempAdv = getTempAdvice(temp);
        let phAdv = getPhAdvice(pH);
        let nh3Adv = getNh3Advice(currentNH3, safeNH3, tan, pH);

        tempAdviceText.innerText = tempAdv || "— — —";
        phAdviceText.innerText = phAdv || "— — —";
        nh3AdviceText.innerText = nh3Adv || "— — —";

        tempAdviceText.className = tempAdv ? "advice-content temp-advice" : "advice-content placeholder";
        phAdviceText.className = phAdv ? "advice-content ph-advice" : "advice-content placeholder";
        nh3AdviceText.className = nh3Adv ? "advice-content nh3-advice" : "advice-content placeholder";
    }

    [tempSlider, phSlider, salSlider, tanSlider, daySlider].forEach(s => s.addEventListener('input', refresh));
    refresh();
</script>
</body>
</html>
