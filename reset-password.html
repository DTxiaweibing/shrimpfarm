<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>重置密码 - 养虾助手</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 60px auto; padding: 0 20px; text-align: center; }
        h2 { color: #333; }
        input { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; margin: 8px 0; }
        button { width: 100%; padding: 12px; font-size: 16px; background: #4CAF50; color: #fff; border: none; border-radius: 6px; cursor: pointer; margin-top: 8px; }
        button:hover { background: #45a049; }
        #msg { margin-top: 12px; padding: 8px; border-radius: 4px; display: none; }
        .error { background: #ffe6e6; color: #cc0000; }
        .success { background: #e6ffe6; color: #006600; }
    </style>
</head>
<body>
    <h2>🔐 重置密码</h2>
    <p style="color:#666;font-size:14px;">养虾助手 - 设置新密码</p>
    <input type="password" id="password" placeholder="请输入新密码（至少6位）" autofocus>
    <button onclick="resetPassword()">确认修改</button>
    <div id="msg"></div>

    <script>
        const supabase = createClient(
            'https://apumkkayconibhkaawdn.supabase.co',
            'sb_publishable_Tn8FsSUL4iDqUsNQGzos6Q_6zMKytC5'
        );

        function showMsg(text, isError) {
            const el = document.getElementById('msg');
            el.textContent = text;
            el.className = isError ? 'error' : 'success';
            el.style.display = 'block';
        }

        async function resetPassword() {
            const newPassword = document.getElementById('password').value.trim();
            if (newPassword.length < 6) {
                showMsg('密码至少6位', true);
                return;
            }

            const { error } = await supabase.auth.updateUser({ password: newPassword });
            if (error) {
                showMsg('修改失败：' + error.message, true);
            } else {
                showMsg('✅ 密码已修改成功，请去APP登录', false);
            }
        }
    </script>
</body>
</html>
